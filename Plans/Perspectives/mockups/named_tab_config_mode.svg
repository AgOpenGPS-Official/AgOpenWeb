<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 3 — The "Spraying" tab in config mode.
  Banner along the top, every toggleable element shows a checkmark
  (visible in this tab) or empty circle (hidden). Reserved elements
  show a tiny lock badge instead. Tap to toggle.
  Canvas: 1280 x 800.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800"
     font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif">

  <rect width="1280" height="800" fill="#0f1419"/>

  <!-- ===== config-mode banner (replaces top bars) ===== -->
  <rect x="64" y="0" width="1216" height="56" fill="#7a4f00"/>
  <rect x="64" y="0" width="4" height="56" fill="#f59f00"/>
  <text x="84" y="34" fill="#fff8e0" font-size="14" font-weight="600">
    Config mode — Spray
  </text>
  <text x="220" y="34" fill="#fdd9a0" font-size="12">
    Tap elements to hide / show.
  </text>
  <g>
    <rect x="1024" y="14" width="100" height="28" rx="4" fill="#1c2128" stroke="#fdd9a0"/>
    <text x="1074" y="33" text-anchor="middle" fill="#fdd9a0" font-size="11" font-weight="600">Reset to all</text>
    <rect x="1140" y="14" width="80"  height="28" rx="4" fill="#f59f00"/>
    <text x="1180" y="33" text-anchor="middle" fill="#1c0d00" font-size="12" font-weight="700">Done</text>
  </g>

  <!-- ===== map area (slightly dimmed in config mode) ===== -->
  <rect x="192" y="56" width="992" height="664" fill="#15324a" opacity="0.55"/>
  <g stroke="#1f4a72" stroke-width="1" opacity="0.35">
    <path d="M192 120 H1184 M192 184 H1184 M192 248 H1184 M192 312 H1184
             M192 376 H1184 M192 440 H1184 M192 504 H1184 M192 568 H1184
             M192 632 H1184 M192 696 H1184"/>
    <path d="M256 56 V720 M320 56 V720 M384 56 V720 M448 56 V720 M512 56 V720
             M576 56 V720 M640 56 V720 M704 56 V720 M768 56 V720 M832 56 V720
             M896 56 V720 M960 56 V720 M1024 56 V720 M1088 56 V720 M1152 56 V720"/>
  </g>
  <g transform="translate(688 388)" opacity="0.65">
    <polygon points="0,-18 14,12 0,6 -14,12" fill="#f59f00" stroke="#fff8e0" stroke-width="1"/>
  </g>

  <!-- compass / camera mode (Reserved, lock badge) -->
  <g transform="translate(1148 96)">
    <circle r="22" fill="#1c2128" stroke="#7d8590" stroke-width="1"/>
    <text y="5" text-anchor="middle" fill="#f59f00" font-size="14" font-weight="700">M</text>
    <g transform="translate(15 -15)">
      <circle r="9" fill="#1c2128" stroke="#7d8590"/>
      <text y="3.5" text-anchor="middle" fill="#7d8590" font-size="9">🔒</text>
    </g>
  </g>

  <!-- ===== tab strip (Spray active) ===== -->
  <rect x="0" y="0" width="64" height="800" fill="#1c2128"/>
  <g>
    <rect x="0" y="8" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="34" text-anchor="middle" fill="#7d8590" font-size="13">All</text>
    <text x="32" y="50" text-anchor="middle" fill="#5a6473" font-size="9">🔒</text>
  </g>
  <line x1="8" y1="72" x2="56" y2="72" stroke="#3a4250" stroke-width="1"/>
  <g>
    <rect x="0" y="80" width="64" height="56" fill="#262d36"/>
    <rect x="0" y="80" width="3"  height="56" fill="#f59f00"/>
    <text x="32" y="113" text-anchor="middle" fill="#f5d27a" font-size="13" font-weight="700">Spray</text>
  </g>
  <g>
    <rect x="0" y="144" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="177" text-anchor="middle" fill="#d4dadf" font-size="13">Till</text>
  </g>
  <g>
    <rect x="0" y="208" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="241" text-anchor="middle" fill="#d4dadf" font-size="13">Bnd</text>
  </g>
  <g>
    <rect x="0" y="272" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="305" text-anchor="middle" fill="#d4dadf" font-size="13">Scout</text>
  </g>

  <!--
    helper symbols for the toggle badges
    ✓ filled = visible in this tab
    ○ empty  = hidden in this tab
    🔒 lock  = reserved (not toggleable)
  -->
  <defs>
    <g id="badge-on">
      <circle r="10" fill="#3d8f4a" stroke="#1c2128" stroke-width="2"/>
      <path d="M-4 0 L-1 3 L4 -3" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <g id="badge-off">
      <circle r="10" fill="#1c2128" stroke="#7d8590" stroke-width="2"/>
    </g>
    <g id="badge-lock">
      <circle r="9" fill="#1c2128" stroke="#7d8590" stroke-width="1"/>
      <text y="3.5" text-anchor="middle" fill="#7d8590" font-size="9">🔒</text>
    </g>
  </defs>

  <!-- ===== left toolbar with badges ===== -->
  <rect x="64" y="56" width="128" height="664" fill="#1c2128"/>
  <g font-size="11" fill="#d4dadf" text-anchor="middle">
    <rect x="76" y="72"  width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="102">Tracks</text><use href="#badge-off" transform="translate(170 78)"/>

    <rect x="76" y="128" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="158">Fields</text><use href="#badge-off" transform="translate(170 134)"/>

    <rect x="76" y="184" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="214">Boundary</text><use href="#badge-off" transform="translate(170 190)"/>

    <rect x="76" y="240" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="270">Headland</text><use href="#badge-off" transform="translate(170 246)"/>

    <rect x="76" y="296" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="326">Flags</text><use href="#badge-off" transform="translate(170 302)"/>

    <rect x="76" y="352" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="382">AutoSteer</text><use href="#badge-off" transform="translate(170 358)"/>

    <rect x="76" y="408" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="438">Sections</text><use href="#badge-off" transform="translate(170 414)"/>

    <rect x="76" y="464" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="494">NTRIP</text><use href="#badge-off" transform="translate(170 470)"/>

    <rect x="76" y="520" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="550">Display</text><use href="#badge-off" transform="translate(170 526)"/>

    <rect x="76" y="576" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="606">Config</text><use href="#badge-off" transform="translate(170 582)"/>

    <rect x="76" y="632" width="104" height="48" rx="4" fill="#262d36"/>
    <text x="128" y="662">Diagnostics</text><use href="#badge-off" transform="translate(170 638)"/>
  </g>

  <!-- ===== right toolbar with badges ===== -->
  <rect x="1184" y="56" width="96" height="664" fill="#1c2128"/>
  <g font-size="10" fill="#d4dadf" text-anchor="middle">
    <rect x="1196" y="72"  width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="105">U-Turn</text><use href="#badge-on" transform="translate(1262 80)"/>

    <rect x="1196" y="136" width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="169">Lateral</text><use href="#badge-on" transform="translate(1262 144)"/>

    <rect x="1196" y="200" width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="233">Steer</text><use href="#badge-off" transform="translate(1262 208)"/>

    <rect x="1196" y="264" width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="297">Heading</text><use href="#badge-off" transform="translate(1262 272)"/>

    <rect x="1196" y="328" width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="361">XTE</text><use href="#badge-off" transform="translate(1262 336)"/>

    <rect x="1196" y="392" width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="425">Zoom</text><use href="#badge-off" transform="translate(1262 400)"/>

    <rect x="1196" y="456" width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="489">Tilt</text><use href="#badge-off" transform="translate(1262 464)"/>

    <rect x="1196" y="520" width="72" height="56" rx="4" fill="#262d36"/>
    <text x="1232" y="553">Day/Nite</text><use href="#badge-off" transform="translate(1262 528)"/>
  </g>

  <!-- ===== bottom toolbar with badges ===== -->
  <rect x="64" y="720" width="1216" height="80" fill="#1c2128"/>
  <g font-size="11" fill="#d4dadf" text-anchor="middle">
    <rect x="80"  y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="140" y="766">Section Ctrl</text><use href="#badge-on" transform="translate(190 740)"/>

    <rect x="216" y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="276" y="766">Coverage</text><use href="#badge-off" transform="translate(326 740)"/>

    <rect x="352" y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="412" y="766">Recording</text><use href="#badge-off" transform="translate(462 740)"/>

    <rect x="488" y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="548" y="766">Simulator</text><use href="#badge-off" transform="translate(598 740)"/>

    <rect x="624" y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="684" y="766">Speed</text><use href="#badge-on" transform="translate(734 740)"/>

    <rect x="760" y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="820" y="766">Tram</text><use href="#badge-off" transform="translate(870 740)"/>

    <rect x="896" y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="956" y="766">Implement</text><use href="#badge-off" transform="translate(1006 740)"/>

    <rect x="1032" y="736" width="120" height="48" rx="4" fill="#262d36"/>
    <text x="1092" y="766">Hotkeys</text><use href="#badge-off" transform="translate(1142 740)"/>
  </g>

  <!-- caption -->
  <text x="640" y="788" text-anchor="middle" fill="#5a6473" font-size="10" opacity="0.7">
    Mockup 3 — Config mode for "Spray". ✓ = visible · ○ = hidden · 🔒 = reserved
  </text>
</svg>
