<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 2 — A user-named "Spraying" tab in user mode.
  Same layout as the All tab, but most chrome is hidden. Only what the
  operator chose to keep is visible. Reserved elements (compass, fix
  quality, AutoSteer indicator, tab strip) are unaffected.
  Canvas: 1280 x 800.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800"
     font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif">

  <rect width="1280" height="800" fill="#0f1419"/>

  <!-- map area expanded since left/right toolbars have been hidden -->
  <rect x="64" y="56" width="1216" height="664" fill="#15324a"/>
  <g stroke="#1f4a72" stroke-width="1" opacity="0.55">
    <path d="M64 120 H1280 M64 184 H1280 M64 248 H1280 M64 312 H1280
             M64 376 H1280 M64 440 H1280 M64 504 H1280 M64 568 H1280
             M64 632 H1280 M64 696 H1280"/>
    <path d="M128 56 V720 M192 56 V720 M256 56 V720 M320 56 V720 M384 56 V720
             M448 56 V720 M512 56 V720 M576 56 V720 M640 56 V720 M704 56 V720
             M768 56 V720 M832 56 V720 M896 56 V720 M960 56 V720 M1024 56 V720
             M1088 56 V720 M1152 56 V720 M1216 56 V720"/>
  </g>
  <path d="M664 600 L664 388 L679 388 L679 600 Z" fill="#3d8f4a" opacity="0.55"/>
  <line x1="671" y1="80" x2="671" y2="720" stroke="#f59f00" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
  <g transform="translate(664 388)">
    <polygon points="0,-18 14,12 0,6 -14,12" fill="#f59f00" stroke="#fff8e0" stroke-width="1"/>
    <circle r="2.5" fill="#fff8e0"/>
  </g>

  <!-- compass / camera mode (Reserved) -->
  <g transform="translate(1240 96)">
    <circle r="22" fill="#1c2128" stroke="#7d8590" stroke-width="1"/>
    <text y="5" text-anchor="middle" fill="#f59f00" font-size="14" font-weight="700">M</text>
  </g>

  <!-- ===== tab strip ===== -->
  <rect x="0" y="0" width="64" height="800" fill="#1c2128"/>
  <!-- All (locked, not active) -->
  <g>
    <rect x="0" y="8" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="34" text-anchor="middle" fill="#7d8590" font-size="13">All</text>
    <text x="32" y="50" text-anchor="middle" fill="#5a6473" font-size="9">🔒</text>
  </g>
  <line x1="8" y1="72" x2="56" y2="72" stroke="#3a4250" stroke-width="1"/>
  <!-- Spray (active) -->
  <g>
    <rect x="0" y="80" width="64" height="56" fill="#262d36"/>
    <rect x="0" y="80" width="3"  height="56" fill="#f59f00"/>
    <text x="32" y="113" text-anchor="middle" fill="#f5d27a" font-size="13" font-weight="700">Spray</text>
  </g>
  <!-- Till -->
  <g>
    <rect x="0" y="144" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="177" text-anchor="middle" fill="#d4dadf" font-size="13">Till</text>
  </g>
  <!-- Bnd -->
  <g>
    <rect x="0" y="208" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="241" text-anchor="middle" fill="#d4dadf" font-size="13">Bnd</text>
  </g>
  <!-- Scout -->
  <g>
    <rect x="0" y="272" width="64" height="56" fill="#1c2128"/>
    <text x="32" y="305" text-anchor="middle" fill="#d4dadf" font-size="13">Scout</text>
  </g>
  <!-- + -->
  <g>
    <rect x="12" y="724" width="40" height="40" rx="20" fill="#262d36" stroke="#3a4250"/>
    <text x="32" y="751" text-anchor="middle" fill="#7d8590" font-size="22" font-weight="300">+</text>
  </g>

  <!-- ===== top-left status bar — only fix quality kept ===== -->
  <rect x="64" y="0" width="200" height="56" fill="#1c2128"/>
  <g>
    <circle cx="86" cy="28" r="7" fill="#3d8f4a"/>
    <text x="100" y="32" fill="#d4dadf" font-size="12">RTK Fix</text>
  </g>
  <text x="166" y="32" fill="#7d8590" font-size="12">Sat 14</text>

  <!-- ===== top-right field status bar — only area worked + AutoSteer ===== -->
  <rect x="1016" y="0" width="264" height="56" fill="#1c2128"/>
  <text x="1036" y="22" fill="#7d8590" font-size="10">AREA WORKED</text>
  <text x="1036" y="42" fill="#d4dadf" font-size="16" font-weight="600">12.4 ha</text>
  <rect x="1200" y="14" width="60" height="28" rx="4" fill="#3d8f4a"/>
  <text x="1230" y="32" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">AUTO</text>

  <!-- left toolbar: HIDDEN entirely (no rect drawn — map fills the space) -->

  <!-- right toolbar: only U-Turn + Lateral kept; floats on top of expanded map -->
  <g font-size="10" fill="#d4dadf" text-anchor="middle">
    <rect x="1196" y="200" width="72" height="56" rx="4" fill="#262d36" stroke="#3a4250" stroke-width="0.5"/>
    <text x="1232" y="233">U-Turn</text>
    <rect x="1196" y="264" width="72" height="56" rx="4" fill="#262d36" stroke="#3a4250" stroke-width="0.5"/>
    <text x="1232" y="297">Lateral</text>
  </g>

  <!-- bottom toolbar: only Section Ctrl + Speed kept -->
  <rect x="64" y="720" width="1216" height="80" fill="#1c2128"/>
  <g font-size="11" fill="#d4dadf" text-anchor="middle">
    <rect x="80"  y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="140" y="766">Section Ctrl</text>
    <rect x="216" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="276" y="766">Speed</text>
  </g>

  <!-- caption -->
  <text x="640" y="788" text-anchor="middle" fill="#5a6473" font-size="10" opacity="0.7">
    Mockup 2 — "Spray" tab in user mode. Operator hid most chrome. Map gets the room.
  </text>
</svg>
