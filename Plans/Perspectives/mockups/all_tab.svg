<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 1 — "All" tab (locked, default).
  Everything visible. This is what every operator sees on first launch
  and the universal escape hatch from a customized tab.
  Canvas: 1280 x 800 (landscape tablet).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800"
     font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif">

  <!-- ===== background ===== -->
  <rect width="1280" height="800" fill="#0f1419"/>

  <!-- ===== map area background ===== -->
  <rect x="192" y="56" width="992" height="664" fill="#15324a"/>
  <!-- map grid -->
  <g stroke="#1f4a72" stroke-width="1" opacity="0.55">
    <path d="M192 120 H1184 M192 184 H1184 M192 248 H1184 M192 312 H1184
             M192 376 H1184 M192 440 H1184 M192 504 H1184 M192 568 H1184
             M192 632 H1184 M192 696 H1184"/>
    <path d="M256 56 V720 M320 56 V720 M384 56 V720 M448 56 V720 M512 56 V720
             M576 56 V720 M640 56 V720 M704 56 V720 M768 56 V720 M832 56 V720
             M896 56 V720 M960 56 V720 M1024 56 V720 M1088 56 V720 M1152 56 V720"/>
  </g>
  <!-- coverage swath behind vehicle -->
  <path d="M688 600 L688 388 L703 388 L703 600 Z" fill="#3d8f4a" opacity="0.55"/>
  <!-- AB line -->
  <line x1="695" y1="80" x2="695" y2="720" stroke="#f59f00" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
  <!-- tractor sprite (always visible) -->
  <g transform="translate(688 388)">
    <polygon points="0,-18 14,12 0,6 -14,12" fill="#f59f00" stroke="#fff8e0" stroke-width="1"/>
    <circle r="2.5" fill="#fff8e0"/>
  </g>

  <!-- map overlay: compass / camera-mode (Reserved) -->
  <g transform="translate(1148 96)">
    <circle r="22" fill="#1c2128" stroke="#7d8590" stroke-width="1"/>
    <text y="5" text-anchor="middle" fill="#f59f00" font-size="14" font-weight="700">M</text>
  </g>

  <!-- ===== tab strip (left, 64w) ===== -->
  <rect x="0" y="0" width="64" height="800" fill="#1c2128"/>
  <!-- All tab (locked, active) -->
  <g>
    <rect x="0" y="8"  width="64" height="56" fill="#262d36"/>
    <rect x="0" y="8"  width="3"  height="56" fill="#f59f00"/>
    <text x="32" y="34" text-anchor="middle" fill="#f5d27a" font-size="13" font-weight="700">All</text>
    <text x="32" y="50" text-anchor="middle" fill="#7d8590" font-size="9">🔒</text>
  </g>
  <!-- separator -->
  <line x1="8" y1="72" x2="56" y2="72" stroke="#3a4250" stroke-width="1"/>
  <!-- (named tabs would go here; this is the unconfigured first run) -->
  <!-- + add tab -->
  <g>
    <rect x="12" y="724" width="40" height="40" rx="20" fill="#262d36" stroke="#3a4250" stroke-width="1"/>
    <text x="32" y="751" text-anchor="middle" fill="#7d8590" font-size="22" font-weight="300">+</text>
  </g>

  <!-- ===== top-left status bar ===== -->
  <rect x="64" y="0" width="400" height="56" fill="#1c2128"/>
  <!-- fix quality (Reserved) -->
  <g>
    <circle cx="86"  cy="28" r="7" fill="#3d8f4a"/>
    <text x="100" y="32" fill="#d4dadf" font-size="12">RTK Fix</text>
  </g>
  <text x="166" y="32" fill="#7d8590" font-size="12">Sat 14</text>
  <text x="222" y="32" fill="#7d8590" font-size="12">NTRIP ✓</text>
  <text x="294" y="32" fill="#d4dadf" font-size="12">Field: South 40</text>
  <text x="416" y="32" fill="#7d8590" font-size="12">14:23</text>

  <!-- ===== top-right field status bar ===== -->
  <rect x="816" y="0" width="368" height="56" fill="#1c2128"/>
  <text x="836" y="22" fill="#7d8590" font-size="10">AREA WORKED</text>
  <text x="836" y="42" fill="#d4dadf" font-size="16" font-weight="600">12.4 ha</text>
  <text x="952" y="22" fill="#7d8590" font-size="10">DISTANCE</text>
  <text x="952" y="42" fill="#d4dadf" font-size="16" font-weight="600">3.2 km</text>
  <text x="1064" y="22" fill="#7d8590" font-size="10">HEADLAND</text>
  <text x="1064" y="42" fill="#d4dadf" font-size="16" font-weight="600">8.6 m</text>
  <!-- AutoSteer indicator (Reserved) -->
  <rect x="1200" y="14" width="60" height="28" rx="4" fill="#3d8f4a"/>
  <text x="1230" y="32" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">AUTO</text>

  <!-- ===== left toolbar (LeftNavigationPanel sub-buttons) ===== -->
  <rect x="64" y="56" width="128" height="664" fill="#1c2128"/>
  <g font-size="11" fill="#d4dadf" text-anchor="middle">
    <rect x="76" y="72"  width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="102">Tracks</text>
    <rect x="76" y="128" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="158">Fields</text>
    <rect x="76" y="184" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="214">Boundary</text>
    <rect x="76" y="240" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="270">Headland</text>
    <rect x="76" y="296" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="326">Flags</text>
    <rect x="76" y="352" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="382">AutoSteer</text>
    <rect x="76" y="408" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="438">Sections</text>
    <rect x="76" y="464" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="494">NTRIP</text>
    <rect x="76" y="520" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="550">Display</text>
    <rect x="76" y="576" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="606">Config</text>
    <rect x="76" y="632" width="104" height="48" rx="4" fill="#262d36"/><text x="128" y="662">Diagnostics</text>
  </g>

  <!-- ===== right toolbar ===== -->
  <rect x="1184" y="56" width="96" height="664" fill="#1c2128"/>
  <g font-size="10" fill="#d4dadf" text-anchor="middle">
    <rect x="1196" y="72"  width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="105">U-Turn</text>
    <rect x="1196" y="136" width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="169">Lateral</text>
    <rect x="1196" y="200" width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="233">Steer</text>
    <rect x="1196" y="264" width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="297">Heading</text>
    <rect x="1196" y="328" width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="361">XTE</text>
    <rect x="1196" y="392" width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="425">Zoom</text>
    <rect x="1196" y="456" width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="489">Tilt</text>
    <rect x="1196" y="520" width="72" height="56" rx="4" fill="#262d36"/><text x="1232" y="553">Day/Nite</text>
  </g>

  <!-- ===== bottom toolbar ===== -->
  <rect x="64" y="720" width="1216" height="80" fill="#1c2128"/>
  <g font-size="11" fill="#d4dadf" text-anchor="middle">
    <rect x="80"  y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="140" y="766">Section Ctrl</text>
    <rect x="216" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="276" y="766">Coverage</text>
    <rect x="352" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="412" y="766">Recording</text>
    <rect x="488" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="548" y="766">Simulator</text>
    <rect x="624" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="684" y="766">Speed</text>
    <rect x="760" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="820" y="766">Tram</text>
    <rect x="896" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="956" y="766">Implement</text>
    <rect x="1032" y="736" width="120" height="48" rx="4" fill="#262d36"/><text x="1092" y="766">Hotkeys</text>
  </g>

  <!-- ===== caption ===== -->
  <text x="640" y="788" text-anchor="middle" fill="#5a6473" font-size="10" opacity="0.7">
    Mockup 1 — "All" tab (locked, default). Everything visible.
  </text>
</svg>
