<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1680" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrow-big" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="16" markerHeight="16" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
  </defs>

  <!-- ==================== TITLE ==================== -->
  <text x="700" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#212121">AgValoniaGPS — Threading architecture: the whole picture</text>
  <text x="700" y="68" text-anchor="middle" font-size="14" fill="#616161">Current reality (top) → six phases (middle) → target (bottom). Problem numbers and phase letters trace through all three.</text>

  <!-- ==================== §0 NON-NEGOTIABLE BAND ==================== -->
  <rect x="40" y="88" width="1320" height="56" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5" rx="8"/>
  <text x="58" y="110" font-size="13" font-weight="700" fill="#880e4f">§0 Non-negotiable (governs all phases):</text>
  <text x="58" y="130" font-size="12" fill="#4a148c">Per-cycle pipeline work runs on a dedicated cycle worker (Task.Run per tick, Interlocked back-pressure). Never on the UI dispatcher. Never on an I/O thread (UDP / NMEA / file).</text>

  <!-- ==================== CURRENT STATE PANEL ==================== -->
  <text x="700" y="175" text-anchor="middle" font-size="17" font-weight="700" fill="#b71c1c">Current reality</text>
  <text x="700" y="195" text-anchor="middle" font-size="12" fill="#b71c1c">Six numbered problems — same numbering as threading_model_current.svg</text>

  <!-- UI lane current -->
  <rect x="40" y="212" width="1320" height="92" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="8"/>
  <text x="56" y="232" font-size="12" font-weight="700" fill="#0d47a1">UI thread</text>
  <rect x="150" y="222" width="340" height="72" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
  <text x="320" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">render &amp; ApplyGpsCycleResult</text>
  <text x="170" y="260" font-size="11" fill="#2e7d32">OK for Vehicle/Field/Section</text>
  <text x="170" y="278" font-size="11" fill="#b71c1c" font-weight="700">not the sole writer of State.YouTurn / State.Guidance</text>
  <rect x="510" y="222" width="280" height="72" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="4"/>
  <text x="650" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">User commands (synchronous)</text>
  <circle cx="540" cy="266" r="10" fill="#b71c1c"/><text x="540" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5</text>
  <text x="560" y="270" font-size="11" fill="#b71c1c">no intent boundary · direct service calls</text>
  <rect x="810" y="222" width="530" height="72" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="4"/>
  <text x="1075" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">VM.OnGpsDataUpdated → TickYouTurnStateMachine</text>
  <circle cx="830" cy="266" r="10" fill="#b71c1c"/><text x="830" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
  <circle cx="856" cy="266" r="10" fill="#b71c1c"/><text x="856" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
  <text x="878" y="270" font-size="11" fill="#b71c1c">runs on event-firing thread · writes ObservableObject from background</text>

  <!-- Cycle lane current (partial) -->
  <rect x="40" y="314" width="1320" height="92" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="8"/>
  <text x="56" y="334" font-size="12" font-weight="700" fill="#1b5e20">Cycle worker — GpsPipelineService (partial)</text>
  <rect x="150" y="340" width="540" height="56" fill="#ffffff" stroke="#2e7d32" stroke-width="1" rx="4"/>
  <text x="420" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#1b5e20">Task.Run per tick · tool / section / coverage / display track</text>
  <text x="170" y="376" font-size="11" fill="#2e7d32">OK as far as it goes — correct pattern, incomplete coverage</text>
  <rect x="710" y="340" width="640" height="56" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="4"/>
  <text x="1030" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">does NOT host YouTurn state machine or AutoSteer guidance</text>
  <text x="730" y="376" font-size="11" fill="#b71c1c">cycle worker isn't the single tick owner — two other threads run cycle-like work in parallel</text>

  <!-- I/O lane current -->
  <rect x="40" y="416" width="1320" height="112" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5" rx="8"/>
  <text x="56" y="436" font-size="12" font-weight="700" fill="#e65100">I/O thread (UDP receive) — doing real work today</text>
  <rect x="150" y="444" width="300" height="76" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="4"/>
  <text x="300" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">NmeaParserServiceFast → AutoSteer</text>
  <circle cx="170" cy="486" r="10" fill="#b71c1c"/><text x="170" y="490" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
  <text x="190" y="490" font-size="11" fill="#b71c1c">guidance + PGN on receive thread</text>
  <circle cx="170" cy="508" r="10" fill="#b71c1c"/><text x="170" y="512" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
  <text x="190" y="512" font-size="11" fill="#b71c1c">own LocalPlane, first parse</text>
  <rect x="470" y="444" width="300" height="76" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="4"/>
  <text x="620" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">NmeaParserService (old) path</text>
  <circle cx="490" cy="486" r="10" fill="#b71c1c"/><text x="490" y="490" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
  <text x="510" y="490" font-size="11" fill="#b71c1c">same NMEA parsed again</text>
  <text x="490" y="510" font-size="11" fill="#b71c1c">→ GpsData → pipeline (second LocalPlane)</text>
  <rect x="790" y="444" width="560" height="76" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="4"/>
  <text x="1070" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">UDP send — PGNs built in Path 1 receive callback</text>
  <circle cx="810" cy="488" r="10" fill="#b71c1c"/><text x="810" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">6</text>
  <text x="830" y="492" font-size="11" fill="#b71c1c">send cadence coupled to packet-arrival cadence, not the cycle</text>

  <!-- ==================== BIG DOWNWARD ARROW → phases ==================== -->
  <line x1="700" y1="540" x2="700" y2="592" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-big)"/>
  <text x="730" y="572" font-size="13" font-weight="700" fill="#37474f">six phases · each addresses one or more numbered problems</text>

  <!-- ==================== PHASES PANEL ==================== -->
  <text x="700" y="620" text-anchor="middle" font-size="17" font-weight="700" fill="#263238">Six phases (A → F)</text>

  <!-- Phase A -->
  <rect x="40" y="636" width="1320" height="70" fill="#e0f2f1" stroke="#00695c" stroke-width="1.5" rx="8"/>
  <rect x="56" y="652" width="30" height="22" fill="#00695c" rx="4"/>
  <text x="71" y="669" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">A</text>
  <text x="96" y="668" font-size="14" font-weight="700" fill="#004d40">Scaffolding — add *WorkingState POCOs, extend GpsCycleResult, define intent surface</text>
  <text x="96" y="688" font-size="11" fill="#00695c">No behavior change. Lets every later phase land as a small reversible change. Addresses no current problem directly; prerequisite for C and D.</text>

  <!-- Phase B (was unify) -->
  <rect x="40" y="716" width="1320" height="90" fill="#e1f5fe" stroke="#01579b" stroke-width="2" rx="8"/>
  <rect x="56" y="732" width="30" height="22" fill="#01579b" rx="4"/>
  <text x="71" y="749" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">B</text>
  <text x="96" y="748" font-size="14" font-weight="700" fill="#01579b">Unify GPS pipeline — absorbs the separate unify-gps-pipeline plan</text>
  <text x="96" y="768" font-size="11" fill="#0277bd">One NMEA parser, one LocalPlane, single cycle owner. AutoSteer heavy work moves behind the Task.Run boundary. PGN cadence becomes cycle-driven.</text>
  <circle cx="96" cy="790" r="9" fill="#01579b"/><text x="96" y="794" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <circle cx="120" cy="790" r="9" fill="#01579b"/><text x="120" y="794" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <circle cx="144" cy="790" r="9" fill="#01579b"/><text x="144" y="794" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">6</text>
  <text x="164" y="794" font-size="11" font-style="italic" fill="#0277bd">moves problems 2, 3, 6 · §0 must be preserved through the merge</text>

  <!-- Phase C (was B) -->
  <rect x="40" y="816" width="1320" height="90" fill="#fff3e0" stroke="#e65100" stroke-width="2" rx="8"/>
  <rect x="56" y="832" width="30" height="22" fill="#e65100" rx="4"/>
  <text x="71" y="849" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">C</text>
  <text x="96" y="848" font-size="14" font-weight="700" fill="#bf360c">YouTurn end-to-end — state machine onto the cycle worker, commands become intents</text>
  <text x="96" y="868" font-size="11" fill="#e65100">Tick runs inside the cycle. State.YouTurn written only by ApplyGpsCycleResult. Manual triggers push thread-safe intents drained next tick.</text>
  <circle cx="96" cy="890" r="9" fill="#e65100"/><text x="96" y="894" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <circle cx="120" cy="890" r="9" fill="#e65100"/><text x="120" y="894" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <circle cx="144" cy="890" r="9" fill="#e65100"/><text x="144" y="894" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text>
  <text x="164" y="894" font-size="11" font-style="italic" fill="#e65100">moves problems 1, 4, 5 · proof-of-pattern phase</text>

  <!-- Phase D (was C) -->
  <rect x="40" y="916" width="1320" height="72" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" rx="8"/>
  <rect x="56" y="932" width="30" height="22" fill="#6a1b9a" rx="4"/>
  <text x="71" y="949" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">D</text>
  <text x="96" y="948" font-size="14" font-weight="700" fill="#4a148c">Guidance state migration — GuidanceWorkingState, nudge / snap commands become intents</text>
  <text x="96" y="968" font-size="11" fill="#6a1b9a">Remainder of problems 4 and 5. After D, the entire cycle runs without touching any ObservableObject.</text>

  <!-- Phase E (was D) -->
  <rect x="40" y="998" width="650" height="72" fill="#f1f8e9" stroke="#558b2f" stroke-width="1.5" rx="8"/>
  <rect x="56" y="1014" width="30" height="22" fill="#558b2f" rx="4"/>
  <text x="71" y="1031" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">E</text>
  <text x="96" y="1030" font-size="14" font-weight="700" fill="#33691e">FieldState audit</text>
  <text x="96" y="1050" font-size="11" fill="#558b2f">Mostly verification. Confirm no background writes to FieldState.</text>

  <!-- Phase F (was E) -->
  <rect x="710" y="998" width="650" height="72" fill="#efebe9" stroke="#4e342e" stroke-width="1.5" rx="8"/>
  <rect x="726" y="1014" width="30" height="22" fill="#4e342e" rx="4"/>
  <text x="741" y="1031" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">F</text>
  <text x="766" y="1030" font-size="14" font-weight="700" fill="#3e2723">ConnectionState (NTRIP / UDP status)</text>
  <text x="766" y="1050" font-size="11" fill="#4e342e">Extend the pattern to async services with their own cadence.</text>

  <!-- ==================== BIG DOWNWARD ARROW → target ==================== -->
  <line x1="700" y1="1090" x2="700" y2="1142" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-big)"/>

  <!-- ==================== TARGET STATE PANEL ==================== -->
  <text x="700" y="1168" text-anchor="middle" font-size="17" font-weight="700" fill="#2e7d32">Target architecture</text>
  <text x="700" y="1188" text-anchor="middle" font-size="12" fill="#2e7d32">Green markers show where each numbered problem has moved to by the end of the phase sequence</text>

  <!-- UI lane target -->
  <rect x="40" y="1202" width="1320" height="92" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="8"/>
  <text x="56" y="1222" font-size="12" font-weight="700" fill="#0d47a1">UI thread</text>
  <rect x="150" y="1230" width="420" height="56" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
  <text x="360" y="1248" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">render · ApplyGpsCycleResult · user commands</text>
  <circle cx="170" cy="1272" r="10" fill="#2e7d32"/><text x="170" y="1276" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
  <circle cx="196" cy="1272" r="10" fill="#2e7d32"/><text x="196" y="1276" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5</text>
  <text x="216" y="1276" font-size="11" fill="#2e7d32">ApplyGpsCycleResult sole writer · commands push intents (no direct service calls)</text>
  <rect x="590" y="1230" width="760" height="56" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
  <text x="970" y="1254" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">no domain logic, no ObservableObject writes from anywhere else</text>
  <text x="610" y="1272" font-size="11" fill="#1565c0">frame budget preserved; turn-creation spike no longer visible here</text>

  <!-- Cycle lane target -->
  <rect x="40" y="1304" width="1320" height="92" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="8"/>
  <text x="56" y="1324" font-size="12" font-weight="700" fill="#1b5e20">Cycle worker — single tick owner via Task.Run + Interlocked</text>
  <rect x="150" y="1332" width="1200" height="56" fill="#ffffff" stroke="#2e7d32" stroke-width="1" rx="4"/>
  <text x="750" y="1352" text-anchor="middle" font-size="12" font-weight="600" fill="#1b5e20">drain intents → tool / guidance / YouTurn Tick / section / coverage / PGN build → emit GpsCycleResult</text>
  <circle cx="170" cy="1374" r="10" fill="#2e7d32"/><text x="170" y="1378" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
  <circle cx="196" cy="1374" r="10" fill="#2e7d32"/><text x="196" y="1378" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
  <text x="216" y="1378" font-size="11" fill="#2e7d32">YouTurn Tick here (C); AutoSteer guidance here (B) · mutates *WorkingState POCOs only</text>

  <!-- I/O lane target -->
  <rect x="40" y="1406" width="1320" height="92" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5" rx="8"/>
  <text x="56" y="1426" font-size="12" font-weight="700" fill="#e65100">I/O thread (UDP receive)</text>
  <rect x="150" y="1432" width="1200" height="56" fill="#ffffff" stroke="#ef6c00" stroke-width="1" rx="4"/>
  <text x="750" y="1452" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">UDP receive → one NMEA parser → one LocalPlane → queue handoff → UDP send of pre-built PGNs</text>
  <circle cx="170" cy="1474" r="10" fill="#2e7d32"/><text x="170" y="1478" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
  <circle cx="196" cy="1474" r="10" fill="#2e7d32"/><text x="196" y="1478" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">6</text>
  <text x="216" y="1478" font-size="11" fill="#2e7d32">single parser / single LocalPlane (B) · PGN cadence driven by the cycle (B) · zero domain logic</text>

  <!-- ==================== FOOTER ==================== -->
  <rect x="40" y="1516" width="1320" height="124" fill="#fafafa" stroke="#37474f" stroke-width="1.5" rx="8"/>
  <text x="56" y="1540" font-size="13" font-weight="700" fill="#263238">Problem → phase → destination (traceability)</text>
  <text x="56" y="1562" font-size="12" fill="#263238">  Problem 1 (YouTurn Tick on event thread) → Phase C → cycle worker</text>
  <text x="56" y="1580" font-size="12" fill="#263238">  Problem 2 (AutoSteer heavy work on UDP) → Phase B → cycle worker</text>
  <text x="56" y="1598" font-size="12" fill="#263238">  Problem 3 (two parsers, two LocalPlanes) → Phase B → single parser, single LocalPlane</text>
  <text x="700" y="1562" font-size="12" fill="#263238">  Problem 4 (ObservableObject from background) → Phases C + D → ApplyGpsCycleResult sole writer</text>
  <text x="700" y="1580" font-size="12" fill="#263238">  Problem 5 (no intent boundary) → Phases C + D → thread-safe intents</text>
  <text x="700" y="1598" font-size="12" fill="#263238">  Problem 6 (packet-driven PGN cadence) → Phase B → cycle-driven PGN cadence</text>
  <text x="56" y="1626" font-size="11" font-style="italic" fill="#546e7a">Phases E (FieldState audit) and F (ConnectionState) extend the pattern to the rest of the codebase; both are verification / generalization rather than problem fixes.</text>
</svg>
