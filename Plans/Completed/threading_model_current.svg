<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1180" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b71c1c"/>
    </marker>
    <marker id="warn" viewBox="0 0 20 20" refX="10" refY="10" markerWidth="18" markerHeight="18" orient="auto">
      <polygon points="10,1 19,17 1,17" fill="#ffebee" stroke="#b71c1c" stroke-width="1.5"/>
      <text x="10" y="15" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">!</text>
    </marker>
  </defs>

  <!-- ==================== TITLE ==================== -->
  <text x="640" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#212121">AgOpenWeb — Current threading model</text>
  <text x="640" y="68" text-anchor="middle" font-size="14" fill="#b71c1c" font-weight="700">Problems in red. Compare with threading_model.svg for the target.</text>
  <text x="640" y="88" text-anchor="middle" font-size="13" fill="#616161">Two parallel parse paths, state machine on the wrong thread, ObservableObject written from background.</text>

  <!-- ==================== UI LANE ==================== -->
  <rect x="40" y="110" width="1200" height="228" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="10"/>
  <text x="60" y="138" font-size="15" font-weight="700" fill="#0d47a1">UI thread (Avalonia dispatcher)</text>
  <text x="60" y="158" font-size="12" fill="#1565c0">Bindings and rendering. Correct in isolation; cross-contaminated by everything below.</text>

  <!-- UI box: render -->
  <rect x="60" y="176" width="280" height="142" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="6"/>
  <text x="200" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#0d47a1">XAML bindings &amp; render loop</text>
  <text x="78" y="220" font-size="12" fill="#263238">reads State.* (ObservableObject)</text>
  <text x="78" y="238" font-size="12" fill="#263238">and map state. ~30 FPS.</text>
  <text x="78" y="264" font-size="12" fill="#2e7d32" font-weight="600">OK — but sees races from below.</text>

  <!-- UI box: ApplyGpsCycleResult — partial -->
  <rect x="360" y="176" width="280" height="142" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="6"/>
  <text x="500" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#0d47a1">ApplyGpsCycleResult(result)</text>
  <text x="378" y="220" font-size="12" fill="#263238">writes State.Vehicle, State.Field,</text>
  <text x="378" y="238" font-size="12" fill="#263238">State.Section, display track…</text>
  <text x="378" y="264" font-size="12" fill="#2e7d32" font-weight="600">OK — but not the only writer.</text>
  <text x="378" y="286" font-size="12" fill="#b71c1c" font-weight="700">Doesn't own State.YouTurn or</text>
  <text x="378" y="302" font-size="12" fill="#b71c1c" font-weight="700">State.Guidance — other writers race.</text>

  <!-- UI box: commands — no intents -->
  <rect x="660" y="176" width="280" height="142" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="6"/>
  <text x="800" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">User commands — synchronous</text>
  <text x="678" y="220" font-size="12" fill="#263238">buttons / hotkeys call services</text>
  <text x="678" y="238" font-size="12" fill="#263238">directly, mutating State.*</text>
  <text x="678" y="258" font-size="12" fill="#b71c1c" font-weight="700">⚠ No intent boundary.</text>
  <text x="678" y="276" font-size="12" fill="#b71c1c" font-weight="700">⚠ UI thread mutates domain state</text>
  <text x="678" y="292" font-size="12" fill="#b71c1c" font-weight="700">   that cycle worker also mutates.</text>
  <text x="678" y="308" font-size="12" fill="#b71c1c" font-weight="700">   Last writer wins.</text>

  <!-- UI box: GpsDataUpdated handler — PROBLEM -->
  <rect x="960" y="176" width="260" height="142" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="6"/>
  <text x="1090" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">VM.OnGpsDataUpdated</text>
  <text x="1090" y="214" text-anchor="middle" font-size="11" font-style="italic" fill="#b71c1c">runs on event-firing thread</text>
  <text x="978" y="238" font-size="12" fill="#263238">calls TickYouTurnStateMachine</text>
  <text x="978" y="256" font-size="12" fill="#263238">synchronously; Tick writes</text>
  <text x="978" y="272" font-size="12" fill="#263238">State.YouTurn, State.Guidance</text>
  <text x="978" y="290" font-size="12" fill="#b71c1c" font-weight="700">⚠ Runs on UDP thread (real GPS)</text>
  <text x="978" y="306" font-size="12" fill="#b71c1c" font-weight="700">⚠ Runs on UI thread (simulator)</text>

  <!-- ==================== ARROWS UI ↔ CYCLE ==================== -->
  <!-- Snapshot up (green, correct) -->
  <line x1="500" y1="338" x2="500" y2="414" stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="360" y="348" width="280" height="42" fill="#fff" stroke="#2e7d32" stroke-width="1" rx="4"/>
  <text x="500" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#1b5e20">GpsCycleResult (correct path)</text>
  <text x="500" y="382" text-anchor="middle" font-size="11" fill="#2e7d32">via Dispatcher.UIThread.Post</text>

  <!-- Synchronous command call down (RED, wrong) -->
  <line x1="800" y1="414" x2="800" y2="338" stroke="#b71c1c" stroke-width="2.2" stroke-dasharray="6 3" marker-end="url(#arrow-red)"/>
  <rect x="660" y="350" width="280" height="42" fill="#fff" stroke="#b71c1c" stroke-width="1.5" rx="4"/>
  <text x="800" y="368" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">Direct service call, no intent</text>
  <text x="800" y="384" text-anchor="middle" font-size="11" fill="#b71c1c">UI thread mutates shared state</text>

  <!-- ==================== CYCLE WORKER LANE (partial/incomplete) ==================== -->
  <rect x="40" y="420" width="1200" height="240" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="10"/>
  <text x="60" y="448" font-size="15" font-weight="700" fill="#1b5e20">Cycle worker — GpsPipelineService.ProcessCycle via Task.Run</text>
  <text x="60" y="468" font-size="12" fill="#2e7d32">Present. Single in-flight via Interlocked guard. Correct pattern for the pieces it hosts.</text>
  <text x="60" y="485" font-size="12" fill="#b71c1c" font-weight="700">⚠ Incomplete: hosts tool / section / coverage / display track, but not YouTurn state machine, not the AutoSteer cycle.</text>

  <!-- Cycle: what runs correctly -->
  <rect x="60" y="502" width="520" height="140" fill="#ffffff" stroke="#2e7d32" stroke-width="1" rx="6"/>
  <text x="320" y="524" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">Runs here (correct)</text>
  <text x="78" y="548" font-size="12" fill="#263238">  ToolPositionService.Update</text>
  <text x="78" y="566" font-size="12" fill="#263238">  TrackGuidanceService.Compute (partially — YouTurn path guidance only)</text>
  <text x="78" y="584" font-size="12" fill="#263238">  SectionControlService.Update</text>
  <text x="78" y="602" font-size="12" fill="#263238">  CoverageMapService.Paint</text>
  <text x="78" y="620" font-size="12" fill="#263238">  GpsCycleResult assembled + dispatched to UI</text>

  <!-- Cycle: what's missing (RED) -->
  <rect x="600" y="502" width="620" height="140" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="6"/>
  <text x="910" y="524" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">Missing from here (wrong)</text>
  <text x="620" y="548" font-size="12" fill="#b71c1c" font-weight="700">  ⚠ YouTurn state machine — runs on event thread (see UI lane)</text>
  <text x="620" y="566" font-size="12" fill="#b71c1c" font-weight="700">  ⚠ AutoSteerService guidance + PGN build — runs on UDP receive thread (see I/O lane)</text>
  <text x="620" y="594" font-size="12" fill="#263238">Consequence: the cycle worker isn't the single owner of the tick.</text>
  <text x="620" y="612" font-size="12" fill="#263238">Two other threads run "cycle-like" work in parallel, on the wrong threads,</text>
  <text x="620" y="630" font-size="12" fill="#263238">mutating shared state the cycle worker also touches.</text>

  <!-- ==================== ARROWS CYCLE ↔ I/O ==================== -->
  <line x1="300" y1="752" x2="300" y2="662" stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="160" y="680" width="280" height="42" fill="#fff" stroke="#2e7d32" stroke-width="1" rx="4"/>
  <text x="300" y="700" text-anchor="middle" font-size="12" font-weight="600" fill="#1b5e20">Path 2: hand off GpsData</text>
  <text x="300" y="716" text-anchor="middle" font-size="11" fill="#2e7d32">GpsDataUpdated → Task.Run</text>

  <!-- Red arrow showing the SECOND cycle running on UDP thread -->
  <line x1="900" y1="752" x2="900" y2="662" stroke="#b71c1c" stroke-width="2.2" stroke-dasharray="6 3" marker-end="url(#arrow-red)"/>
  <rect x="740" y="680" width="320" height="42" fill="#fff" stroke="#b71c1c" stroke-width="1.5" rx="4"/>
  <text x="900" y="700" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">Path 1: AutoSteer runs inline here</text>
  <text x="900" y="716" text-anchor="middle" font-size="11" fill="#b71c1c">no handoff — heavy work on receive thread</text>

  <!-- ==================== I/O LANE ==================== -->
  <rect x="40" y="750" width="1200" height="240" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5" rx="10"/>
  <text x="60" y="776" font-size="15" font-weight="700" fill="#e65100">I/O threads (UDP receive)</text>
  <text x="60" y="796" font-size="12" fill="#ef6c00">Should just parse and hand off. Today: hosts a full parallel pipeline.</text>

  <!-- UDP receive -->
  <rect x="60" y="810" width="200" height="164" fill="#ffffff" stroke="#ef6c00" stroke-width="1" rx="6"/>
  <text x="160" y="832" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100">UDP receive</text>
  <text x="78" y="854" font-size="12" fill="#263238">socket callback,</text>
  <text x="78" y="872" font-size="12" fill="#263238">route by PGN ID</text>
  <text x="78" y="896" font-size="12" fill="#2e7d32" font-weight="600">OK in isolation</text>

  <!-- Parse path 1 (fast) -->
  <rect x="280" y="810" width="280" height="164" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="6"/>
  <text x="420" y="832" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">Path 1: NmeaParserServiceFast</text>
  <text x="298" y="854" font-size="12" fill="#263238">Span-based parse → VehicleState</text>
  <text x="298" y="872" font-size="12" fill="#263238">+ auto-LocalPlane + ConvertWgs84</text>
  <text x="298" y="890" font-size="12" fill="#263238">+ TrackGuidance + SendPgns</text>
  <text x="298" y="918" font-size="12" fill="#b71c1c" font-weight="700">⚠ Guidance on receive thread</text>
  <text x="298" y="934" font-size="12" fill="#b71c1c" font-weight="700">⚠ Own LocalPlane instance</text>
  <text x="298" y="950" font-size="12" fill="#b71c1c" font-weight="700">⚠ Fires StateUpdated → VM races</text>

  <!-- Parse path 2 (old) -->
  <rect x="580" y="810" width="280" height="164" fill="#ffffff" stroke="#b71c1c" stroke-width="2" rx="6"/>
  <text x="720" y="832" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">Path 2: NmeaParserService (old)</text>
  <text x="598" y="854" font-size="12" fill="#263238">string-based parse → GpsData</text>
  <text x="598" y="872" font-size="12" fill="#263238">→ GpsService.UpdateGpsData</text>
  <text x="598" y="890" font-size="12" fill="#263238">→ fires GpsDataUpdated event</text>
  <text x="598" y="918" font-size="12" fill="#b71c1c" font-weight="700">⚠ Same NMEA parsed twice</text>
  <text x="598" y="934" font-size="12" fill="#b71c1c" font-weight="700">⚠ Second LocalPlane created later</text>
  <text x="598" y="950" font-size="12" fill="#b71c1c" font-weight="700">   in the pipeline</text>

  <!-- UDP send -->
  <rect x="880" y="810" width="340" height="164" fill="#ffffff" stroke="#ef6c00" stroke-width="1" rx="6"/>
  <text x="1050" y="832" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100">UDP send</text>
  <text x="898" y="854" font-size="12" fill="#263238">ships PGNs built on Path 1</text>
  <text x="898" y="872" font-size="12" fill="#263238">(steer angle, section bits)</text>
  <text x="898" y="896" font-size="12" fill="#b71c1c" font-weight="700">⚠ Built in the receive callback,</text>
  <text x="898" y="912" font-size="12" fill="#b71c1c" font-weight="700">   not the cycle worker. PGN cadence</text>
  <text x="898" y="928" font-size="12" fill="#b71c1c" font-weight="700">   coupled to packet arrival cadence.</text>

  <!-- I/O lane internal arrows -->
  <line x1="260" y1="892" x2="278" y2="892" stroke="#ef6c00" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="892" x2="578" y2="892" stroke="#b71c1c" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-red)"/>
  <line x1="860" y1="892" x2="878" y2="892" stroke="#ef6c00" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== PROBLEMS BOX ==================== -->
  <rect x="40" y="1010" width="1200" height="152" fill="#ffebee" stroke="#b71c1c" stroke-width="2" rx="10"/>
  <text x="60" y="1036" font-size="14" font-weight="700" fill="#b71c1c">Problems (why this needs the migration)</text>
  <text x="60" y="1058" font-size="12" fill="#b71c1c" font-weight="700">1.  YouTurn state machine runs on the event-firing thread — UDP receive for real GPS, UI dispatcher for the simulator. Either is wrong.</text>
  <text x="60" y="1076" font-size="12" fill="#b71c1c" font-weight="700">2.  AutoSteerService runs full guidance + PGN build on the UDP receive thread. Heavy work blocks packet ingestion; lost PGNs under load.</text>
  <text x="60" y="1094" font-size="12" fill="#b71c1c" font-weight="700">3.  NMEA parsed twice via two separate parsers; two LocalPlane instances created; coordinate divergence risk.</text>
  <text x="60" y="1112" font-size="12" fill="#b71c1c" font-weight="700">4.  State.YouTurn and State.Guidance (ObservableObject) written from background threads without marshaling. Latent binding exceptions.</text>
  <text x="60" y="1130" font-size="12" fill="#b71c1c" font-weight="700">5.  No intent boundary between UI and cycle worker. Commands directly invoke services that mutate shared state. Multiple writers, no ordering guarantees.</text>
  <text x="60" y="1148" font-size="12" fill="#b71c1c" font-weight="700">6.  PGN send cadence is coupled to packet-arrival cadence, not to the cycle. Output rate isn't deterministic.</text>
</svg>
