name: CI

# Per-commit CI: run the test suite and compile-check every platform head on push/PR to main.
# It does NOT package or publish anything — all artifacts, tagged releases, and the nightly
# prerelease are produced by the single packaging workflow, build-deploy-bundles.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read   # CI only — no releases here

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run Model Tests
        run: dotnet test Tests/AgOpenWeb.Models.Tests/ --verbosity normal

      - name: Run Service Tests
        run: dotnet test Tests/AgOpenWeb.Services.Tests/ --verbosity normal

      - name: Run UI Tests
        run: dotnet test Tests/AgOpenWeb.UI.Tests/ --verbosity normal

      - name: Run Guidance Algorithm Tests
        run: dotnet run --project TestRunner/TestRunner.csproj

  # Compile-check each platform head (no packaging — build-deploy-bundles.yml does the publishes).
  build-desktop:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # -p:DesktopOnly=true collapses the shared net10.0;net10.0-ios multi-target to net10.0
      # so the desktop head compiles without the iOS workload.
      - name: Compile Desktop
        run: dotnet build Platforms/AgOpenWeb.Desktop/AgOpenWeb.Desktop.csproj -c Release -p:DesktopOnly=true

  build-android:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install Android workload
        run: |
          for i in 1 2 3; do
            dotnet workload install android && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Compile Android
        run: dotnet build Platforms/AgOpenWeb.Android/AgOpenWeb.Android.csproj -c Release

  build-ios:
    runs-on: macos-26
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4.1
        # The .NET for iOS workload is pinned to 26.4.x via dotnet-ios-rollback.json to match
        # Xcode_26.4.1.app on macos-26 (the runner's 26.5 beta has no downloaded iOS platform).
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install iOS workload (pinned to 26.4.x)
        run: |
          for i in 1 2 3; do
            dotnet workload install ios \
              --from-rollback-file .github/workflows/dotnet-ios-rollback.json \
              && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Compile iOS
        run: dotnet build Platforms/AgOpenWeb.iOS/AgOpenWeb.iOS.csproj -c Debug -f net10.0-ios -r iossimulator-arm64
