name: Build Deployment Bundles

# Builds the AgOpenWeb deployment bundles on clean runners and publishes ONE complete Release
# with every user-facing artifact (the single release publisher; build-and-release.yml is for
# per-commit CI + nightly only):
#   - Linux x64 / arm64 daemon: self-contained host + systemd unit + install scripts (.tar.gz),
#     via deploy/linux/package.sh — the in-cab headless daemon for mini-PCs / SBCs.
#   - Linux x64 / arm64 launcher: self-contained desktop app (.tar.gz), via
#     deploy/linux/launcher/package.sh — the all-in-one window (host + embedded WebView UI).
#   - Windows x64: self-contained all-in-one launcher app + Windows Service installer (.zip),
#     via deploy/windows/package.sh — double-click launcher OR install-service.cmd for a daemon.
#   - macOS arm64: self-contained all-in-one launcher .dmg, via deploy/macos/package.sh
#     (needs a macOS runner for codesign/hdiutil; ad-hoc signed — notarization is a later step).
#   - Android: signed APK (the all-in-one launcher / native app), built inline (same steps as
#     build-and-release.yml's build-android, using the ANDROID_KEYSTORE_BASE64 secret).
# Each deploy/*/package.sh is the single source of truth; this workflow just runs them on a
# clean runner (so arm64 / Windows bundles aren't cross-published by hand on a dev Mac). The
# Windows bundle cross-publishes win-x64 from a Linux runner — no Windows runner needed.
#
# Triggers:
#   - push of a v* tag: build + publish the tagged Release for that tag.
#   - schedule (daily): build + refresh the rolling "nightly" prerelease.
#   - workflow_dispatch: build on demand. Supply a release_tag to also publish that Release;
#     leave it empty to just upload build artifacts (a dry run — no Release).
# (Per-commit CI — tests + compile checks — lives in build-and-release.yml.)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v26.6.7). Leave empty to only upload build artifacts.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'
  schedule:
    # Daily rolling nightly prerelease at 06:00 UTC.
    - cron: '0 6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read    # build jobs only read; the release job grants itself write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]   # mini-PC / amd64 and Pi / Uno-Q / arm64 SBCs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # package.sh cross-publishes self-contained (-p:DesktopOnly=true collapses the shared
      # projects' net10.0;net10.0-ios multi-target to net10.0, avoiding the Mono runtime-pack
      # NU1102 on a cross-arch publish) and tars it with the systemd unit + install scripts.
      - name: Build Linux appliance bundle (${{ matrix.arch }})
        run: ./deploy/linux/package.sh --arch ${{ matrix.arch }} --out "$GITHUB_WORKSPACE/dist"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agopenweb-linux-${{ matrix.arch }}
          path: dist/agopenweb-linux-*.tar.gz
          retention-days: 30

  linux-launcher:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]   # desktop Linux (amd64) and ARM desktop / SBC with a display
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # The desktop twin of the Windows/macOS launcher: self-contained app + run wrapper +
      # .desktop entry + per-user installer. The embedded WebView needs a system WebKit on the
      # target (documented in the bundle README); not bundled — normal for a desktop app.
      - name: Build Linux desktop launcher bundle (${{ matrix.arch }})
        run: ./deploy/linux/launcher/package.sh --arch ${{ matrix.arch }} --out "$GITHUB_WORKSPACE/dist"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agopenweb-launcher-linux-${{ matrix.arch }}
          path: dist/agopenweb-launcher-linux-*.tar.gz
          retention-days: 30

  windows:
    runs-on: ubuntu-latest   # cross-publishes win-x64 from Linux — no Windows runner needed
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # windows/package.sh cross-publishes the self-contained launcher exe and zips it
      # (strips the ~84 MB SkiaSharp native pdb). On Windows: extract + run the exe.
      - name: Build Windows launcher bundle (x64)
        run: ./deploy/windows/package.sh --arch x64 --out "$GITHUB_WORKSPACE/dist"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agopenweb-win-x64
          path: dist/agopenweb-win-x64.zip
          retention-days: 30

  macos:
    runs-on: macos-14   # Apple silicon (arm64) — the .dmg is osx-arm64; needs macOS for hdiutil/codesign
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # macos/package.sh publishes the self-contained osx-arm64 launcher (-p:DesktopOnly=true,
      # so no iOS workload needed), wraps it as AgOpenWeb.app, ad-hoc-signs, and makes a .dmg.
      - name: Build macOS launcher bundle (arm64 .dmg)
        run: ./deploy/macos/package.sh --out "$GITHUB_WORKSPACE/dist"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agopenweb-macos-arm64
          path: dist/agopenweb-macos-arm64.dmg
          retention-days: 30

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install Android workload
        run: |
          for i in 1 2 3; do
            dotnet workload install android && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Restore dependencies
        run: dotnet restore Platforms/AgOpenWeb.Android/AgOpenWeb.Android.csproj

      # AgOpenWeb release keystore (supplied via the ANDROID_KEYSTORE_BASE64 secret) — a stable
      # signing identity for over-the-top updates; falls back to the ephemeral debug key with a
      # warning if the secret is absent.
      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/agopenweb-release.keystore"
            echo "path=$RUNNER_TEMP/agopenweb-release.keystore" >> "$GITHUB_OUTPUT"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — APK signed with the runner's ephemeral debug key (won't update over differently-signed installs)."
          fi

      - name: Build Android APK
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          ARGS=(publish Platforms/AgOpenWeb.Android/AgOpenWeb.Android.csproj
                -c Release -f net10.0-android -o publish/android)
          if [ "${{ steps.keystore.outputs.present }}" = "true" ]; then
            ARGS+=(-p:AndroidKeyStore=true
                   "-p:AndroidSigningKeyStore=${{ steps.keystore.outputs.path }}"
                   -p:AndroidSigningKeyAlias=agopenweb
                   -p:AndroidSigningStorePass=env:KS_PASS
                   -p:AndroidSigningKeyPass=env:KS_PASS)
          fi
          dotnet "${ARGS[@]}"

      - name: Collect signed APK
        run: |
          mkdir -p dist
          APK=$(find publish/android -type f -name "*-Signed.apk" | head -1)
          [ -n "$APK" ] || { echo "No signed APK found!"; exit 1; }
          cp "$APK" dist/agopenweb-android.apk

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agopenweb-android
          path: dist/agopenweb-android.apk
          retention-days: 30

  release:
    needs: [linux, linux-launcher, windows, macos, android]
    # Publish a Release only for a v* tag push, or a manual run that supplied a tag.
    # Publish for a v* tag, a dispatch that supplied a release_tag, or the scheduled nightly.
    # A plain dispatch with no tag still builds the artifacts (above) but skips publishing.
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != '' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # publish/refresh the Release
    steps:
      - uses: actions/checkout@v4

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION=$(grep -oP 'VERSION\s+"\K[^"]+' sys/version.h || echo "0.0.0")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Rolling nightly: a single reused "nightly" tag/release, refreshed each run.
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "name=Nightly Build ($(date +'%Y-%m-%d'))" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "nightly=true" >> "$GITHUB_OUTPUT"
            echo "banner=> ⚠️ Automated nightly prerelease of the latest \`main\` — unversioned, may be unstable." >> "$GITHUB_OUTPUT"
          else
            if [ -n "${{ github.event.inputs.release_tag }}" ]; then TAG="${{ github.event.inputs.release_tag }}"; else TAG="${GITHUB_REF#refs/tags/}"; fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=AgOpenWeb ${TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "nightly=false" >> "$GITHUB_OUTPUT"
            echo "banner=" >> "$GITHUB_OUTPUT"
          fi

      - name: List bundles
        run: find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' -o -name '*.apk' \)

      # The nightly reuses one tag/release; delete the prior one so assets don't accumulate.
      - name: Refresh rolling nightly
        if: steps.meta.outputs.nightly == 'true'
        run: |
          gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body: |
            ## ${{ steps.meta.outputs.name }}

            ${{ steps.meta.outputs.banner }}

            **Version:** ${{ steps.meta.outputs.version }}

            Self-contained — no .NET install needed. Pick the set that matches how you'll run it.
            (In every mode the host also serves `http://<host>:5174` on the LAN, so other devices
            connect in a browser.)

            ### 🖥️ Desktop — a window with the guidance UI (host runs in-process)
            | OS | Download | Run |
            |---|---|---|
            | Windows x64 | `agopenweb-win-x64.zip` | run `AgOpenWeb.Desktop.exe` (needs the WebView2 Runtime, pre-installed on Windows 11) |
            | macOS (Apple silicon) | `agopenweb-macos-arm64.dmg` | drag **AgOpenWeb** to Applications, launch (first launch: right-click → **Open**) |
            | Linux x64 / arm64 | `agopenweb-launcher-linux-<arch>.tar.gz` | extract, `./run.sh` (needs system WebKitGTK — see the bundle README) |

            ### 🛰️ Headless — no window; UI in a browser/tablet at `http://<host>:5174` (in-cab mini-PC / SBC)
            | OS | Download | Install (auto-starts on boot) |
            |---|---|---|
            | Linux x64 / arm64 | `agopenweb-linux-<arch>.tar.gz` | `sudo ./install.sh --from app` (systemd; installs ICU + libfontconfig/libGL) |
            | Windows x64 | `agopenweb-win-x64.zip` | right-click `install-service.cmd` → **Run as administrator** (Windows Service) |

            ### 📱 Mobile — all-in-one (host + UI on the device)
            | Device | Download | Install |
            |---|---|---|
            | Android | `agopenweb-android.apk` | sideload |

            See each download's bundled `README` for full prerequisites and details.
          draft: false
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.dmg
            dist/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
